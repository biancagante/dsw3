{% extends 'template.html' %}

{% block titulo %}
    Contato
{% endblock%}

{% block conteudo %}
    <div class="divFormContato">
        <h1>Entre em contato!</h1>
        <form action="{% url 'addcontato' %}" method="post" class="formContato">
            {% csrf_token %}
            {{form}}
            <input type="submit" value="Enviar mensagem">
        </form>
    </div>
{% endblock %}
