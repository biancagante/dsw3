{% extends 'template.html' %}

{% block titulo %}Dashboard{% endblock %}

{% block conteudo %}
<section class="dashboard-section">
    <div class="dashboard-header">
        <h1 class="dashboard-title">Dashboard</h1>
        <p class="dashboard-subtitle">Gerencie os dados da aplicação</p>
    </div>
    <div class="dashboard-grid">
        <a href="{% url 'adminproduto' %}" class="dashboard-card">
            <div class="dashboard-card-content">
                <h2 class="dashboard-card-title">Produtos</h2>
                <p class="dashboard-card-desc">Gerenciar produtos cadastrados</p>
            </div>
        </a>
        <a href="{% url 'adminusuarios' %}" class="dashboard-card">
            <div class="dashboard-card-content">
                <h2 class="dashboard-card-title">Usuários</h2>
                <p class="dashboard-card-desc">Visualizar usuários do sistema</p>
            </div>
        </a>
        <a href="{% url 'listarcontatos' %}" class="dashboard-card">
            <div class="dashboard-card-content">
                <h2 class="dashboard-card-title">Contatos</h2>
                <p class="dashboard-card-desc">Mensagens recebidas</p>
            </div>
        </a>
    </div>
</section>
{% endblock %}
