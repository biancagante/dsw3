{% extends 'template.html' %}

{% block titulo %}Confirmar{% endblock %}

{% block conteudo %}
    <div class="fixed inset-0 flex items-center justify-center bg-black/50 backdrop-blur-sm z-50">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 animate-fade-in">
            <div class="mb-4">
                <h2 class="text-2xl text-zinc-800">Confirmar ação</h2>
            </div>
            <div class="mb-6">
                <p class="text-zinc-600">
                    Tem certeza que deseja 
                    <span class="font-semibold text-zinc-800">{{ acao|lower }}</span>
                    a {{ classe }} 
                    <span class="font-semibold text-zinc-800">{{ objeto }}</span>?
                </p>
            </div>
            <div class="flex justify-end gap-3">
                <a href="javascript:history.back()" class="px-4 py-2 rounded-lg bg-zinc-100 text-zinc-700 hover:bg-zinc-200 transition">Cancelar</a>
                <a href="{{ url }}" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-500 transition">{{ acao }}</a>
            </div>
        </div>
    </div>
{% endblock %}
