{% extends 'template.html' %}

{% block titulo %}
    Criar conta
{% endblock %}

{% block conteudo %}
<section class="section h-screen mx-auto">
    <div class="form-container">
        <h1 class="form-title">Criar conta</h1>
        <form method="post" class="form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Criar nova conta</button>
        </form>
    </div>
</section>
{% endblock %}
