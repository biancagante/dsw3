{% extends 'template.html' %}

{% block titulo %}
    Home
{% endblock %}

{% block conteudo %}
    <section class="w-max flex flex-col bg-zinc-800 overflow-hidden rounded-xl p-6 gap-y-2">
        <form action="{% url 'perguntar' %}" method="post" class="flex items-center gap-3">
            {% csrf_token %}
            {{ form }}
            <button type="submit" class="p-2 rounded-md w-max bg-sky-600 font-semibold hover:bg-sky-700 cursor-pointer">Ir para perguntas</button>
        </form>
    </section>
{% endblock %}
